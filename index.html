<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&display=swap" rel="stylesheet">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1055/1055672.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Charadas becawest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* SOLUÇÃO SIMPLES - Imagem de fundo + Gradiente */
        body {
            font-family: "Raleway", sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: url('/templates/img1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            position: relative;
        }

        /* Gradiente animado por cima da imagem */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            opacity: 0.85;
            z-index: 0;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 1200px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-family: "Fredoka", sans-serif;
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #e0e7ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
            letter-spacing: 3px;
            animation: float 3s ease-in-out infinite;
        }


        @media (min-width: 768px) {
            h1 {
                font-size: 4rem;
            }
        }

        .main-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
            flex-wrap: wrap;
            width: 100%;
        }

        /* Painel de pontos simplificado */
        .pontos-card {
            background: rgba(255, 255, 255, 0.626);
            backdrop-filter: blur(10px);
            padding: 30px 40px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            min-width: 160px;
        }

        .pontos-card p {
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
        }

        .pontos-valor {
            font-size: 4rem;
            font-weight: bold;
            font-family: "Fredoka", sans-serif;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Container do card 3D */
        .card-3d-container {
            width: 550px;
            height: 450px;
            perspective: 1000px;
        }

        @media (max-width: 768px) {
            .card-3d-container {
                width: 95vw;
                height: 480px;
            }
        }

        .card-wrapper {
            width: 100%;
            height: 100%;
            cursor: pointer;
            position: relative;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            border-radius: 25px;
        }

        .card-wrapper.card-virado .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .card-front {
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .card-back {
            background: linear-gradient(135deg, #6366f1 0%, #d4a8df 100%);
            transform: rotateY(180deg);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .badge {
            display: inline-block;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
            letter-spacing: 0.5px;
        }

        .badge i {
            margin-right: 10px;
        }

        .badge-pergunta {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .badge-resposta {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .pergunta-texto, .resposta-texto {
            font-size: 1.5rem;
            line-height: 1.6;
            font-weight: 600;
        }

        @media (min-width: 768px) {
            .pergunta-texto, .resposta-texto {
                font-size: 1.9rem;
            }
        }

        .pergunta-texto {
            color: #1f2937;
        }

        .resposta-texto {
            color: white;
            margin-bottom: 25px;
        }

        .dica {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 20px;
        }

        .dica i {
            margin-right: 5px;
        }

        .dica-front {
            color: #8b5cf6;
        }

        .dica-back {
            color: rgba(255, 255, 255, 0.7);
        }

        /* Botões de ação dentro do card */
        .botoes-resposta {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            width: 100%;
        }

        .btn-resposta {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: "Raleway", sans-serif;
        }

        .btn-acertou {
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            color: white;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }

        .btn-acertou:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.5);
        }

        .btn-errou {
            background: linear-gradient(135deg, #f44336, #c62828);
            color: white;
            box-shadow: 0 4px 15px rgba(244, 67, 54, 0.3);
        }

        .btn-errou:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(244, 67, 54, 0.5);
        }

        /* Botões inferiores */
        .botoes-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 35px;
            border: none;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-nova {
            background: linear-gradient(135deg, #ffffff 0%, #f0f4ff 100%);
            color: #667eea;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-nova:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
        }

        .btn-reset {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%);
            color: white;
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.3);
        }

        .btn-reset:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(255, 107, 107, 0.5);
        }

        footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85rem;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
            margin-top: 20px;
        }

        footer a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 2px solid rgba(255, 255, 255, 0.4);
            transition: border-color 0.2s;
        }

        footer a:hover {
            border-bottom-color: white;
        }

        @keyframes pulsePoints {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .pulse-animation {
            animation: pulsePoints 0.3s ease;
        }

        /* Toast personalizado */
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            z-index: 10000;
            transition: transform 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .toast-message.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> <i class="fas fa-star"></i> Charadas becawest <i class="fas fa-star"></i> </h1>

        <div class="main-content">
            <!-- Painel de Pontos -->
            <div class="pontos-panel">
                <div class="pontos-card">
                    <p><i class="fas fa-trophy"></i> PONTOS</p>
                    <div class="pontos-valor" id="pontos">0</div>
                </div>
            </div>

            <!-- Card 3D -->
            <div class="card-3d-container">
                <div class="card-wrapper" id="card-wrapper">
                    <div class="card-inner" id="card-inner">
                        <!-- Frente - Pergunta -->
                        <div class="card-front">
                            <div class="badge badge-pergunta"><i class="fas fa-question-circle"></i> PERGUNTA</div>
                            <p class="pergunta-texto" id="pergunta">Carregando...</p>
                            <div class="dica dica-front"><i class="fas fa-redo"></i> Clique para virar</div>
                        </div>
                        
                        <!-- Verso - Resposta com botões -->
                        <div class="card-back">
                            <div class="badge badge-resposta"><i class="fas fa-lightbulb"></i> RESPOSTA</div>
                            <p class="resposta-texto" id="resposta">Carregando...</p>
                            
                            <!-- Botões de acertou/errou dentro do card -->
                            <div class="botoes-resposta">
                                <button class="btn-resposta btn-acertou" id="btn-acertou-card">
                                    <i class="fas fa-check-circle"></i> Acertou! +10
                                </button>
                                <button class="btn-resposta btn-errou" id="btn-errou-card">
                                    <i class="fas fa-times-circle"></i> Errou! -5
                                </button>
                            </div>
                            
                            <div class="dica dica-back"><i class="fas fa-redo"></i> Clique para voltar</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="botoes-container">
            <button class="btn btn-reset" id="btn-reset"><i class="fas fa-broom"></i> Resetar Pontos</button>
            <button class="btn btn-nova" id="btn-nova"><i class="fas fa-dice-d6"></i> Nova Charada</button>
        </div>

        <footer>
            Feito por <a href="https://www.linkedin.com/in/rebeca-diniz-970437350/" target="_blank">Rebeca</a> <i class="fas fa-star"></i>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
